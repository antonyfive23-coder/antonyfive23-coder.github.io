<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a1628">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>AquaControl Pro</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"><\/script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"><\/script>

  load(B+'firebase-app-compat.js',function(){load(B+'firebase-database-compat.js',function(){load(B+'firebase-auth-compat.js',function(){if(window.__fbReady)window.__fbReady();});});});

<\/script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f4f8;--sf:#fff;--s2:#f7f9fc;--bd:#e2e8f0;--navy:#0a1628;--blue:#2589c7;--teal:#0d8a7a;--green:#1a7a4a;--amber:#c97b00;--red:#c0392b;--gl:rgba(26,122,74,.1);--al:rgba(201,123,0,.1);--rl:rgba(192,57,43,.1);--bl:rgba(37,137,199,.1);--t1:#1a2332;--t2:#4a5568;--t3:#8899aa;--co:#2589c7;--nh:64px;--sb:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--t1);}
#login{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#0a1628,#0d2847 55%,#0a3d2e);padding:24px;}
.ll{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:16px;box-shadow:0 8px 32px rgba(37,137,199,.45);}
.lt{font-size:26px;font-weight:800;color:#fff;margin-bottom:4px;}
.ls{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:28px;}
.lb{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:20px;width:100%;max-width:360px;margin-bottom:12px;}
.ll2{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:1px;margin-bottom:8px;}
.li{width:100%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;font-family:'Sora',sans-serif;font-size:15px;padding:13px;outline:none;margin-bottom:6px;}
.li:focus{border-color:var(--blue);}
.le{color:#f87171;font-size:11px;text-align:center;min-height:16px;margin-bottom:4px;line-height:1.4;}
.lbtn{width:100%;max-width:360px;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;font-family:'Sora',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px;}
.lbtn:disabled{opacity:.6;}
.llink{font-size:11px;color:rgba(255,255,255,.35);cursor:pointer;text-align:center;margin-top:4px;display:block;}
.lfooter{position:absolute;bottom:calc(12px + var(--sb));font-size:10px;color:rgba(255,255,255,.18);}
#step2{display:none;}
#app{display:none;}
#app.on{display:block;}
.hdr{position:sticky;top:0;z-index:100;height:56px;background:var(--co,var(--navy));display:flex;align-items:center;gap:10px;padding:0 14px;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.hico{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:18px;}
.hin{flex:1;min-width:0;}
.hn{font-size:14px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hc{font-size:9px;color:rgba(255,255,255,.4);font-family:'JetBrains Mono',monospace;}
.hr{display:flex;align-items:center;gap:7px;}
.sync{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;background:rgba(255,255,255,.1);font-size:9px;font-weight:700;color:rgba(255,255,255,.4);}
.sync.ok{background:rgba(74,222,128,.15);color:#4ade80;}
.sync.err{background:rgba(248,113,113,.15);color:#f87171;}
.sdot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.sync.ok .sdot{animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.hclk{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.4);}
.hbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;}
.hmore{background:none;border:none;color:rgba(255,255,255,.6);font-size:22px;cursor:pointer;padding:2px 4px;line-height:1;}
#bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:calc(var(--nh) + var(--sb));padding-bottom:var(--sb);background:var(--navy);border-top:1px solid rgba(255,255,255,.08);z-index:100;justify-content:space-around;align-items:center;}
@media(max-width:768px){#bnav{display:flex;}}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 2px;color:rgba(255,255,255,.32);}
.ni.on{color:#fff;}
.nico{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.ni.on .nico{background:rgba(255,255,255,.12);}
.nlbl{font-size:9px;font-weight:700;letter-spacing:.2px;}
#omenu{position:fixed;top:62px;right:12px;background:var(--sf);border:1px solid var(--bd);border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.15);z-index:200;min-width:220px;display:none;flex-direction:column;overflow:hidden;}
#omenu.on{display:flex;}
.omi{display:flex;align-items:center;gap:12px;padding:13px 18px;font-size:13px;font-weight:600;color:var(--t1);cursor:pointer;border-bottom:1px solid var(--bd);}
.omi:last-child{border:none;}
.omi:active{background:var(--s2);}
.omi.red{color:var(--red);}
.main{padding:14px;max-width:1400px;margin:0 auto;padding-bottom:calc(var(--nh) + var(--sb) + 74px);}
.tab{display:none;}
.tab.on{display:block;}
#fab{position:fixed;bottom:calc(var(--nh) + var(--sb) + 12px);right:14px;width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,var(--teal),var(--blue));border:none;cursor:pointer;font-size:22px;box-shadow:0 4px 20px rgba(13,138,122,.5);display:none;align-items:center;justify-content:center;z-index:99;}
@media(max-width:768px){#fab{display:flex;}}
#toast{position:fixed;bottom:calc(var(--nh) + var(--sb) + 80px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:500;white-space:nowrap;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:14px;margin-bottom:14px;overflow:hidden;}
.chd{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;}
.chd:active{background:var(--s2);}
.ci{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.ci.bl{background:var(--bl);}
.ci.tl{background:rgba(13,138,122,.1);}
.ci.gr{background:var(--gl);}
.ci.am{background:var(--al);}
.ci.rd{background:var(--rl);}
.ct{font-size:13px;font-weight:700;}
.cs{font-size:10px;color:var(--t3);margin-top:1px;}
.ctog{color:var(--t3);font-size:11px;margin-left:auto;}
.cbody{border-top:1px solid var(--bd);max-height:0;overflow:hidden;transition:max-height .35s ease;}
.cbody.on{max-height:9999px;}
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:12px 8px;text-align:center;}
.sn{font-size:24px;font-weight:800;line-height:1;}
.sl{font-size:9px;color:var(--t3);margin-top:3px;font-weight:700;letter-spacing:.3px;}
.sc.bl .sn{color:var(--blue);}
.sc.gr .sn{color:var(--green);}
.sc.am .sn{color:var(--amber);}
.sc.rd .sn{color:var(--red);}
.dt{width:100%;border-collapse:collapse;font-size:12px;}
.dt th{background:var(--s2);color:var(--t3);font-size:9px;font-weight:700;letter-spacing:.5px;padding:7px 8px;text-align:left;border-bottom:1px solid var(--bd);}
.dt td{padding:7px 8px;border-bottom:1px solid var(--bd);}
.dt tr:last-child td{border:none;}
.tc{text-align:center!important;}
.ci2{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:8px;padding:7px 6px;font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;outline:none;color:var(--t1);text-align:center;}
.ci2:focus{border-color:var(--blue);background:#fff;}
.ci2.ok{border-color:var(--green);background:var(--gl);}
.ci2.warn{border-color:var(--amber);background:var(--al);}
.ci2.bad{border-color:var(--red);background:var(--rl);}
.fi{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:10px;padding:11px 13px;font-size:13px;font-family:'Sora',sans-serif;outline:none;color:var(--t1);}
.fi:focus{border-color:var(--blue);background:#fff;}
.fg{margin-bottom:12px;}
.fl{font-size:11px;font-weight:700;color:var(--t2);display:block;margin-bottom:5px;}
.btn{border:none;border-radius:10px;padding:10px 16px;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.bp{background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;}
.bs{background:var(--s2);border:1px solid var(--bd);color:var(--t2);}
.brd{background:var(--rl);color:var(--red);}
.kg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.kc{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:16px;}
.kv{font-size:32px;font-weight:800;line-height:1;}
.kl{font-size:10px;color:var(--t3);margin-top:4px;font-weight:700;}
.kv.bl{color:var(--blue);}
.kv.gr{color:var(--green);}
.kv.am{color:var(--amber);}
.kv.rd{color:var(--red);}
.ab{padding:10px 14px;border-radius:10px;font-size:12px;font-weight:600;margin-bottom:8px;}
.ab.bad{background:var(--rl);color:var(--red);}
.ab.warn{background:var(--al);color:var(--amber);}
.cfgs{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:18px;margin-bottom:14px;}
.cfgt{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.8px;margin-bottom:14px;}
.pp{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:10px;text-align:center;}
.ppv{font-size:18px;font-weight:800;line-height:1;}
.ppn{font-size:9px;font-weight:700;color:var(--t3);margin-top:3px;}
.ppr{font-size:8px;color:var(--t3);}
.wlbl{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:5px 11px;font-size:11px;font-weight:700;color:var(--t2);display:inline-block;}
.incc{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:10px;}
.is{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:9px;font-weight:700;margin-top:6px;}
.iso{background:var(--rl);color:var(--red);}
.isp{background:var(--al);color:var(--amber);}
.isd{background:var(--gl);color:var(--green);}
@media print{#bnav,#fab,#omenu,.hdr,#toast{display:none!important;}.main{padding:0!important;}.cbody{max-height:9999px!important;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="ll">💧</div>
  <div class="lt">AquaControl Pro</div>
  <div class="ls">Control de Legionella · ACS · Piscinas</div>
  <div class="lb" id="step1">
    <div class="ll2">EMAIL DE EMPRESA</div>
    <input class="li" id="emailInp" type="email" placeholder="empresa@correo.com" autocomplete="email">
    <div class="le" id="err1"></div>
  </div>
  <button class="lbtn" id="btnCont" onclick="goStep2()">Continuar →</button>
  <div class="lb" id="step2">
    <div style="font-size:12px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:10px" id="s2email"></div>
    <input class="li" id="passInp" type="password" placeholder="Contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="le" id="err2"></div>
    <button class="lbtn" id="btnLogin" onclick="doLogin()" style="margin-top:6px">🔐 Entrar</button>
    <span class="llink" onclick="goStep1()">← Cambiar email</span>
    <span class="llink" onclick="resetPass()">🔑 Olvidé mi contraseña</span>
  </div>
  <div id="regBox" style="display:none;width:100%;max-width:360px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:20px;margin-top:10px">
    <div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:10px;text-align:center">📝 Crear cuenta nueva</div>
    <input class="li" id="regE" type="email" placeholder="Email">
    <input class="li" id="regP1" type="password" placeholder="Contraseña (mín. 6 caracteres)">
    <input class="li" id="regP2" type="password" placeholder="Repetir contraseña">
    <div class="le" id="errReg"></div>
    <button class="lbtn" id="btnReg" onclick="doRegister()">Crear cuenta</button>
  </div>
  <span class="llink" onclick="toggleReg()" style="margin-top:8px">📝 Crear cuenta nueva</span>
  <div class="lfooter">AquaControl Pro v5.0 · Legionella · ACS · Piscinas</div>
</div>

<!-- APP -->
<div id="app">
  <div class="hdr">
    <div class="hico" id="hLogo">💧</div>
    <div class="hin"><div class="hn" id="hName">AquaControl Pro</div><div class="hc" id="hCode"></div></div>
    <div class="hr">
      <div class="sync" id="syncPill"><div class="sdot"></div><span id="syncTxt">—</span></div>
      <div class="hclk" id="clk"></div>
      <button class="hbtn" onclick="doSave()">💾</button>
      <button class="hmore" onclick="toggleMenu()">⋮</button>
    </div>
  </div>
  <div id="omenu">
    <div class="omi" onclick="cm();doSave()">💾 Guardar datos</div>
    <div class="omi" onclick="cm();genPDF()">📄 Informe PDF</div>
    <div class="omi" onclick="cm();exportExcel()">📊 Exportar Excel</div>
    <div class="omi" onclick="cm();sendEmail()">✉️ Enviar informe</div>
    <div class="omi red" onclick="cm();doLogout()">🚪 Cerrar sesión</div>
  </div>
  <div class="main">
    <!-- DASHBOARD -->
    <div class="tab on" id="tab-dashboard">
      <div class="kg">
        <div class="kc"><div class="kv bl" id="k1">0</div><div class="kl">REGISTROS HOY</div></div>
        <div class="kc"><div class="kv gr" id="k2">—</div><div class="kl">COMPLETADO</div></div>
        <div class="kc"><div class="kv am" id="k3">0</div><div class="kl">ALERTAS</div></div>
        <div class="kc"><div class="kv rd" id="k4">0</div><div class="kl">INCIDENCIAS</div></div>
      </div>
      <div id="alertsBox"></div>
      <div class="card">
        <div class="chd" onclick="tog(this)"><div class="ci bl">📊</div><div><div class="ct">Resumen</div><div class="cs" id="dashSub">—</div></div><span class="ctog">▼</span></div>
        <div class="cbody on" style="padding:14px" id="dashCont"></div>
      </div>
    </div>
    <!-- CONDENSADORES -->
    <div class="tab" id="tab-ppcl">
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <select class="fi" id="ppclMoSel" style="flex:1;max-width:160px" onchange="ppclMo=parseInt(this.value);renderPPCL()"></select>
        <input class="fi" id="ppclYr" type="number" style="width:80px" onchange="renderPPCL()">
        <button class="btn bp" onclick="renderPPCL()">🔄</button>
      </div>
      <div class="srow">
        <div class="sc bl"><div class="sn" id="pTot">0</div><div class="sl">REGISTROS</div></div>
        <div class="sc gr"><div class="sn" id="pOk">0%</div><div class="sl">COMPLETO</div></div>
        <div class="sc rd"><div class="sn" id="pAlrt">0</div><div class="sl">ALERTAS</div></div>
      </div>
      <div id="ppclCont"></div>
    </div>
    <!-- PISCINAS -->
    <div class="tab" id="tab-piscina">
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <input type="date" class="fi" id="piscDate" style="flex:1" onchange="renderPiscina()">
        <select class="fi" id="piscSes" style="width:130px" onchange="renderPiscina()">
          <option value="manana">☀️ Mañana</option>
          <option value="tarde">🌙 Tarde</option>
        </select>
        <button class="btn bp" onclick="piscHoy()">Hoy</button>
      </div>
      <div class="srow">
        <div class="sc bl"><div class="sn" id="piTot">0</div><div class="sl">TOTAL</div></div>
        <div class="sc gr"><div class="sn" id="piOk">0</div><div class="sl">OK</div></div>
        <div class="sc rd"><div class="sn" id="piAlrt">0</div><div class="sl">ALERTAS</div></div>
      </div>
      <div id="piscCont"></div>
    </div>
    <!-- ACS -->
    <div class="tab" id="tab-acs">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <button class="btn bs" onclick="acsWN(-1)">‹</button>
        <span class="wlbl" id="acsWLbl">—</span>
        <button class="btn bs" onclick="acsWN(1)">›</button>
        <button class="btn bp" onclick="acsWToday()">Hoy</button>
      </div>
      <div id="acsCont"></div>
    </div>
    <!-- AGUA POTABLE -->
    <div class="tab" id="tab-potable">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <button class="btn bs" onclick="potWN(-1)">‹</button>
        <span class="wlbl" id="potWLbl">—</span>
        <button class="btn bs" onclick="potWN(1)">›</button>
        <button class="btn bp" onclick="potWToday()">Hoy</button>
      </div>
      <div id="potCont"></div>
    </div>
    <!-- CHECKS -->
    <div class="tab" id="tab-checklist"><div id="chkCont"></div></div>
    <!-- INCIDENCIAS -->
    <div class="tab" id="tab-incidencias">
      <button class="btn bp" style="width:100%;margin-bottom:14px" onclick="newInc()">+ Nueva incidencia</button>
      <div id="incCont"></div>
    </div>
    <!-- CONFIG -->
    <div class="tab" id="tab-config">
      <div class="cfgs">
        <div class="cfgt">🏢 EMPRESA</div>
        <div class="fg"><label class="fl">Nombre empresa</label><input class="fi" id="cfgName" placeholder="Mi empresa" oninput="sv('__name',this.value)"></div>
        <div class="fg"><label class="fl">👤 Técnico responsable</label><input class="fi" id="cfgTec" placeholder="Nombre del técnico" oninput="sv('__tecnico',this.value)"></div>
        <button class="btn bp" onclick="saveProfile()">💾 Guardar perfil</button>
      </div>
      <div class="cfgs">
        <div class="cfgt">🏗 INSTALACIONES</div>
        <div style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:8px">Condensadores evaporativos</div>
        <div id="condList"></div>
        <button class="btn bs" style="width:100%;margin-bottom:14px" onclick="addCond()">+ Añadir condensador</button>
        <div style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:8px">Piscinas y jacuzzis</div>
        <div id="piscList"></div>
        <button class="btn bs" style="width:100%;margin-bottom:14px" onclick="addPisc()">+ Añadir piscina/jacuzzi</button>
        <div style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:8px">Grifos ACS</div>
        <div id="grifoList"></div>
        <button class="btn bs" style="width:100%;margin-bottom:14px" onclick="addGrifo()">+ Añadir grifo</button>
        <button class="btn bp" style="width:100%" onclick="saveInst()">💾 Guardar instalaciones</button>
      </div>
      <div class="cfgs">
        <div class="cfgt">☁️ CUENTA</div>
        <div id="cfgSync" style="background:var(--s2);border-radius:8px;padding:10px;font-size:12px;font-weight:600;color:var(--t2)">Conectando…</div>
        <div style="font-size:11px;color:var(--t3);margin-top:8px">Email: <span id="cfgUser">—</span></div>
      </div>
    </div>
  </div>
  <nav id="bnav">
    <div class="ni on" data-tab="dashboard" onclick="goTab('dashboard',this)"><div class="nico">📊</div><span class="nlbl">Inicio</span></div>

function isoWeek(d){const t=new Date(d);t.setHours(0,0,0,0);t.setDate(t.getDate()+3-(t.getDay()+6)%7);const w=new Date(t.getFullYear(),0,4);return t.getFullYear()+'W'+String(1+Math.round(((t-w)/86400000-3+(w.getDay()+6)%7)/7)).padStart(2,'0');}
function addWeeks(wk,n){const[yr,w]=wk.split('W').map(Number);const d=new Date(yr,0,1+(w-1)*7);d.setDate(d.getDate()+n*7);return isoWeek(d);}
function weekLbl(wk){const[yr,w]=wk.split('W').map(Number);const d=new Date(yr,0,1+(w-1)*7);const e=new Date(d);e.setDate(e.getDate()+6);return `Semana ${w} — ${d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'})} al ${e.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'})}`;}

// ── INPUTS ────────────────────────────────────────────
function colorI(inp,f){
  if(!inp.value){inp.className='ci2';return;}
  const v=parseFloat(inp.value);let c='ok';
  if(f==='ph'){c=v<7||v>8.5?'bad':v<7.2||v>8?'warn':'ok';}
  else if(f==='temperatura'){c=v>37?'bad':v>35?'warn':'ok';}
  else if(f==='turbidez'){c=v>5?'bad':v>2?'warn':'ok';}
  else if(f==='cloro'){c=v<0.5||v>2?'bad':v<0.8||v>1.5?'warn':'ok';}
  inp.className='ci2 '+c;
}
function ic(key,ph,f){
  const v=(gv(key)||'').replace(/"/g,'&quot;');
  return `<input type="text" class="ci2" placeholder="${ph||''}" value="${v}" data-k="${key}" data-f="${f||''}" inputmode="decimal" onchange="sv(this.dataset.k,this.value);colorI(this,this.dataset.f);doSave();" oninput="colorI(this,this.dataset.f)">`;
}
function sel(key,opts){
  const v=gv(key);
  return `<select class="ci2" data-k="${key}" onchange="sv(this.dataset.k,this.value);doSave()">${opts.map(o=>`<option value="${o}"${v===o?' selected':''}>${o}</option>`).join('')}</select>`;
}

// ── CONDENSADORES ─────────────────────────────────────
function renderPPCL(){
  const yr=parseInt(document.getElementById('ppclYr').value)||new Date().getFullYear();
  ppclMo=parseInt(document.getElementById('ppclMoSel').value);
  const conds=getConds();const days=new Date(yr,ppclMo+1,0).getDate();
  const fields=[{id:'biocidad',lbl:'Biocidad',unit:'mg/L',f:''},{id:'temperatura',lbl:'Temp.',unit:'°C',f:'temperatura'},{id:'ph',lbl:'pH',unit:'',f:'ph'},{id:'turbidez',lbl:'Turb.',unit:'NTU',f:'turbidez'}];
  let tot=0,fill=0,alrt=0,html='';
  conds.forEach(c=>{
    html+=`<div class="card"><div class="chd" onclick="tog(this)"><div class="ci bl">🌡️</div><div><div class="ct">${c.name}</div><div class="cs">${MOS[ppclMo]} ${yr}</div></div><span class="ctog">▼</span></div>
    <div class="cbody on" style="padding:14px;overflow-x:auto"><table class="dt" style="min-width:380px"><thead><tr><th>DÍA</th><th class="tc">Biocidad<br><small>mg/L</small></th><th class="tc">Temp.<br><small>°C</small></th><th class="tc">pH</th><th class="tc">Turbidez<br><small>NTU</small></th></tr></thead><tbody>`;
    for(let d=1;d<=days;d++){
      html+=`<tr><td><b>${d}</b></td>`;
      fields.forEach(fd=>{
        const k=mk('ppcl',yr,ppclMo,c.n,d,fd.id);const v=gv(k);tot++;
        if(v){fill++;const vn=parseFloat(v);
          if(fd.f==='ph'&&(vn<7||vn>8.5))alrt++;
          if(fd.f==='temperatura'&&vn>37)alrt++;
          if(fd.f==='turbidez'&&vn>5)alrt++;
        }
        html+=`<td class="tc">${ic(k,fd.unit,fd.f)}</td>`;
      });
      html+='</tr>';
    }
    html+='</tbody></table></div></div>';
  });
  document.getElementById('ppclCont').innerHTML=html||'<div style="text-align:center;padding:30px;color:var(--t3)">Añade condensadores en ⚙️ Config</div>';
  document.querySelectorAll('#ppclCont .ci2').forEach(el=>{if(el.dataset.f)colorI(el,el.dataset.f);});
  document.getElementById('pTot').textContent=fill;
  document.getElementById('pOk').textContent=tot?Math.round(fill/tot*100)+'%':'0%';
  document.getElementById('pAlrt').textContent=alrt;
}

// ── PISCINAS ──────────────────────────────────────────
function piscHoy(){document.getElementById('piscDate').value=ds(new Date());renderPiscina();}
function renderPiscina(){
  const date=document.getElementById('piscDate').value||ds(new Date());
  const ses=document.getElementById('piscSes').value||'manana';
  const piscs=getPiscs();
  const fields=[{id:'cloro',lbl:'Cloro libre',unit:'mg/L',f:'cloro'},{id:'ph',lbl:'pH',unit:'',f:'ph'},{id:'temp',lbl:'Temperatura',unit:'°C',f:'temperatura'},{id:'turb',lbl:'Turbidez',unit:'NTU',f:'turbidez'},{id:'alc',lbl:'Alcalinidad',unit:'mg/L',f:''}];
  let tot=0,ok=0,alrt=0,html='';
  piscs.forEach(p=>{
    html+=`<div class="card"><div class="chd" onclick="tog(this)"><div class="ci tl">${p.tipo==='jacuzzi'?'🛁':'🏊'}</div><div><div class="ct">${p.name}</div><div class="cs">${date} · ${ses==='manana'?'Mañana':'Tarde'}</div></div><span class="ctog">▼</span></div>
    <div class="cbody on" style="padding:14px">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">`;
    fields.slice(0,3).forEach(fd=>{
      const k=mk('pisc',date,ses,p.id,fd.id);const v=gv(k);tot++;
      let c='var(--t1)';if(v){const n=parseFloat(v);
        if(fd.f==='cloro'&&(n<0.5||n>2)){c='var(--red)';alrt++;}
        else if(fd.f==='ph'&&(n<7.2||n>7.8)){c='var(--red)';alrt++;}
        else ok++;
      }
      html+=`<div class="pp"><div class="ppv" style="color:${c}">${v||'—'}</div><div class="ppn">${fd.lbl}</div></div>`;
    });
    html+=`</div><table class="dt"><thead><tr><th>PARÁMETRO</th><th>RANGO</th><th class="tc">VALOR</th></tr></thead><tbody>`;
    const rangos={cloro:'0.5–2.0',ph:'7.2–7.8',temperatura:'24–40',turbidez:'<2',alc:'80–150'};
    fields.forEach(fd=>{
      const k=mk('pisc',date,ses,p.id,fd.id);
      html+=`<tr><td>${fd.lbl}</td><td style="color:var(--t3);font-size:11px">${rangos[fd.id]||''} ${fd.unit}</td><td class="tc">${ic(k,fd.unit,fd.f)}</td></tr>`;
    });
    const obsK=mk('pisc',date,ses,p.id,'obs');
    html+=`</tbody></table><div style="margin-top:10px"><label class="fl">Observaciones</label><input class="fi" placeholder="Incidencias, tratamientos…" value="${gv(obsK).replace(/"/g,'&quot;')}" data-k="${obsK}" onchange="sv(this.dataset.k,this.value);doSave()"></div></div></div>`;
  });
  document.getElementById('piscCont').innerHTML=html||'<div style="text-align:center;padding:30px;color:var(--t3)">Añade piscinas en ⚙️ Config</div>';
  document.querySelectorAll('#piscCont .ci2').forEach(el=>{if(el.dataset.f)colorI(el,el.dataset.f);});
  document.getElementById('piTot').textContent=tot;
  document.getElementById('piOk').textContent=ok;
  document.getElementById('piAlrt').textContent=alrt;
}

function acsWN(n){acsWk=addWeeks(acsWk,n);document.getElementById('acsWLbl').textContent=weekLbl(acsWk);renderACS();}

  const grifos=getGrifos();

  grifos.forEach(g=>{
    html+=`<tr><td><b>${g.ni}</b></td><td>${g.name}</td><td class="tc">${ic(mk('acs',acsWk,g.n,'tf'),'°C','')}</td><td class="tc">${ic(mk('acs',acsWk,g.n,'tc'),'°C','temperatura')}</td><td class="tc">${sel(mk('acs',acsWk,g.n,'ap'),['','SÍ','NO','N/A'])}</td></tr>`;

// ── AGUA POTABLE ──────────────────────────────────────
const PUNTOS=[{n:1,name:'Depósito principal'},{n:2,name:'Punto de entrada'},{n:3,name:'Red distribución'}];
function potWN(n){potWk=addWeeks(potWk,n);document.getElementById('potWLbl').textContent=weekLbl(potWk);renderPotable();}
function potWToday(){potWk=isoWeek(new Date());document.getElementById('potWLbl').textContent=weekLbl(potWk);renderPotable();}
function renderPotable(){
  let html='<div style="overflow-x:auto"><table class="dt" style="min-width:440px"><thead><tr><th>PUNTO</th><th class="tc">Cloro<br><small>0.2–1 mg/L</small></th><th class="tc">pH<br><small>6.5–9.5</small></th><th class="tc">Turbidez<br><small>&lt;4 NTU</small></th><th class="tc">Resultado</th></tr></thead><tbody>';
  PUNTOS.forEach(p=>{
    const b=mk('pot',potWk,p.n);

  });
  html+='</tbody></table></div>';
  document.getElementById('potCont').innerHTML=html;

// ── CHECKLISTS ────────────────────────────────────────
const CHKS=[
  ['apertura','🔓 Apertura piscina',['Medir cloro libre (0.5-2.0 mg/L)','Medir pH (7.2-7.8)','Medir temperatura del agua','Comprobar turbidez visual','Revisar filtros','Verificar nivel del agua','Comprobar dosificadores','Revisar skimmers','Inspección visual vaso','Registrar hora de apertura']],
  ['cierre','🔒 Cierre piscina',['Análisis final del agua','Añadir tratamiento nocturno','Comprobar cloro al cierre','Limpiar línea de flotación','Revisar equipos filtración','Registrar hora de cierre','Verificar alarmas']],
  ['cond','🌡️ Revisión condensadores',['Inspección visual equipos','Comprobar nivel de agua','Verificar ventiladores','Revisar dosificación biocidas','Medir temperatura retorno','Comprobar purgas automáticas','Inspeccionar bandejas','Registrar lecturas']]
];
function renderChecks(){
  const today=ds(new Date());
  let html='';
  CHKS.forEach(([id,title,items])=>{
    const done=items.filter((_,i)=>gv(mk('chk',today,id,i))==='1').length;
    html+=`<div class="card"><div class="chd" onclick="tog(this)"><div class="ci gr">${title.split(' ')[0]}</div><div><div class="ct">${title.substring(title.indexOf(' ')+1)}</div><div class="cs">${done}/${items.length} completados · ${Math.round(done/items.length*100)}%</div></div><span class="ctog">▼</span></div><div class="cbody"><div style="padding:8px 0">`;
    items.forEach((item,i)=>{
      const k=mk('chk',today,id,i);const d=gv(k)==='1';const t=gv(k+'_t')||'';
      html+=`<div style="display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--bd);cursor:pointer" onclick="toggleChk('${k}')"><div style="width:22px;height:22px;border-radius:6px;border:2px solid ${d?'var(--green)':'var(--bd)'};background:${d?'var(--green)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">${d?'<span style="color:#fff;font-size:13px;font-weight:700">✓</span>':''}</div><span style="flex:1;font-size:13px;font-weight:600;color:${d?'var(--t3)':'var(--t1)'};${d?'text-decoration:line-through':''}">${item}</span>${t?`<span style="font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace">${t}</span>`:''}</div>`;
    });
    html+=`</div></div></div>`;
  });
  document.getElementById('chkCont').innerHTML=html;
}
function toggleChk(k){
  const v=gv(k)==='1';sv(k,v?'':'1');
  if(!v)sv(k+'_t',new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}));
  renderChecks();doSave();
}

// ── INCIDENCIAS ───────────────────────────────────────
function renderIncs(){
  const incs=getIncs();
  let html='';
  if(!incs.length)html='<div style="text-align:center;padding:30px;color:var(--t3)">✅ Sin incidencias registradas</div>';
  else incs.slice().reverse().forEach(inc=>{
    const cls=inc.status==='cerrada'?'isd':inc.status==='proceso'?'isp':'iso';
    const lbl=inc.status==='cerrada'?'✅ Cerrada':inc.status==='proceso'?'⚙️ En proceso':'🔴 Abierta';
    html+=`<div class="incc"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="font-size:14px;font-weight:700">${inc.titulo}</div><button class="btn brd" style="font-size:11px;padding:4px 8px" onclick="delInc('${inc.id}')">🗑</button></div><div style="font-size:11px;color:var(--t3);margin-top:4px">${inc.fecha} · ${inc.ubic||'—'}</div><div class="is ${cls}">${lbl}</div>${inc.desc?`<div style="font-size:12px;color:var(--t2);margin-top:8px">${inc.desc}</div>`:''}<div style="margin-top:10px"><select class="fi" style="font-size:12px" onchange="changeInc('${inc.id}',this.value)"><option value="abierta"${inc.status==='abierta'?' selected':''}>🔴 Abierta</option><option value="proceso"${inc.status==='proceso'?' selected':''}>⚙️ En proceso</option><option value="cerrada"${inc.status==='cerrada'?' selected':''}>✅ Cerrada</option></select></div></div>`;
  });
  document.getElementById('incCont').innerHTML=html;
}
function newInc(){
  const t=prompt('Título de la incidencia:');if(!t)return;
  const u=prompt('Ubicación:')||'';
  const d=prompt('Descripción:')||'';
  const incs=getIncs();
  incs.push({id:'i'+Date.now(),titulo:t,ubic:u,desc:d,fecha:new Date().toLocaleDateString('es-ES'),status:'abierta'});
  sv('__incs',JSON.stringify(incs));doSave();renderIncs();toast('✅ Incidencia creada');
}
function delInc(id){if(!confirm('¿Eliminar?'))return;const incs=getIncs().filter(i=>i.id!==id);sv('__incs',JSON.stringify(incs));doSave();renderIncs();}
function changeInc(id,status){const incs=getIncs();const i=incs.findIndex(x=>x.id===id);if(i>=0)incs[i].status=status;sv('__incs',JSON.stringify(incs));doSave();renderIncs();}

// ── DASHBOARD ─────────────────────────────────────────
function renderDash(){
  const now=new Date();const yr=now.getFullYear();const d=now.getDate();
  const conds=getConds();const piscs=getPiscs();const grifos=getGrifos();const incs=getIncs();
  let regs=0,alrts=0;
  conds.forEach(c=>{['biocidad','temperatura','ph','turbidez'].forEach(f=>{if(gv(mk('ppcl',yr,ppclMo,c.n,d,f)))regs++;});});
  const td=ds(now);
  ['manana','tarde'].forEach(ses=>{piscs.forEach(p=>{['cloro','ph','temp','turb'].forEach(f=>{if(gv(mk('pisc',td,ses,p.id,f)))regs++;});});});
  piscs.forEach(p=>{['manana','tarde'].forEach(ses=>{const cl=parseFloat(gv(mk('pisc',td,ses,p.id,'cloro')));const ph=parseFloat(gv(mk('pisc',td,ses,p.id,'ph')));if(cl&&(cl<0.5||cl>2))alrts++;if(ph&&(ph<7.2||ph>7.8))alrts++;});});
  conds.forEach(c=>{const ph=parseFloat(gv(mk('ppcl',yr,ppclMo,c.n,d,'ph')));const t=parseFloat(gv(mk('ppcl',yr,ppclMo,c.n,d,'temperatura')));if(ph&&(ph<7||ph>8.5))alrts++;if(t&&t>37)alrts++;});
  document.getElementById('k1').textContent=regs;
  document.getElementById('k2').textContent='—';
  document.getElementById('k3').textContent=alrts;
  document.getElementById('k4').textContent=incs.filter(i=>i.status!=='cerrada').length;
  const ab=document.getElementById('alertsBox');ab.innerHTML='';
  if(alrts>0){const b=document.createElement('div');b.className='ab bad';b.textContent=`⚠️ ${alrts} alerta${alrts>1?'s':''} activa${alrts>1?'s':''} — revisa los parámetros`;ab.appendChild(b);}
  document.getElementById('dashSub').textContent=`${MOS[ppclMo]} ${yr} · ${conds.length} condensadores · ${piscs.length} piscinas`;
  document.getElementById('dashCont').innerHTML=`<div class="srow"><div class="sc bl"><div class="sn">${conds.length}</div><div class="sl">CONDENSADORES</div></div><div class="sc tl" style="--teal:#0d8a7a"><div class="sn" style="color:var(--teal)">${piscs.length}</div><div class="sl">PISCINAS</div></div><div class="sc am"><div class="sn">${grifos.length}</div><div class="sl">GRIFOS ACS</div></div></div><div style="text-align:center;padding:8px;font-size:12px;color:var(--t2)">👤 Técnico: <b>${gv('__tecnico')||'No configurado'}</b></div>`;
}

// ── EXCEL ─────────────────────────────────────────────
function exportExcel(){
  if(typeof XLSX==='undefined'){toast('❌ XLSX no disponible');return;}
  const wb=XLSX.utils.book_new();
  const yr=parseInt(document.getElementById('ppclYr').value)||new Date().getFullYear();
  const conds=getConds();const piscs=getPiscs();const grifos=getGrifos();
  const now=new Date();const tec=gv('__tecnico')||'—';const nom=gv('__name')||'Mi Empresa';
  // Resumen
  const res=[['INFORME AQUACONTROL PRO'],['Empresa',nom],['Técnico',tec],['Fecha',now.toLocaleString('es-ES')],[],['Condensadores',conds.length],['Piscinas',piscs.length],['Grifos ACS',grifos.length],['Incidencias abiertas',getIncs().filter(i=>i.status!=='cerrada').length]];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(res),'Resumen');
  // Condensadores
  const days=new Date(yr,ppclMo+1,0).getDate();
  const cH=['DÍA',...conds.flatMap(c=>[c.name+' Bio',c.name+' Temp',c.name+' pH',c.name+' Turb']),'TÉCNICO'];
  const cR=[['CONDENSADORES — '+MOS[ppclMo]+' '+yr],['Técnico: '+tec],[],cH];
  for(let d=1;d<=days;d++){cR.push([d,...conds.flatMap(c=>['biocidad','temperatura','ph','turbidez'].map(f=>{const v=gv(mk('ppcl',yr,ppclMo,c.n,d,f));return v?parseFloat(v):''})),tec]);}
  cR.push([],['FIRMA: '+tec,'FECHA: '+now.toLocaleString('es-ES'),'✅ Documento oficial AquaControl Pro']);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(cR),'Condensadores');
  // Piscinas
  const td=ds(now);
  const pR=[['PISCINAS — '+now.toLocaleDateString('es-ES')],['Técnico: '+tec],[],['PISCINA','SESIÓN','CLORO','pH','TEMP','TURB','OBS','TÉCNICO']];
  piscs.forEach(p=>{['manana','tarde'].forEach(ses=>{pR.push([p.name,ses==='manana'?'Mañana':'Tarde',gv(mk('pisc',td,ses,p.id,'cloro'))||'',gv(mk('pisc',td,ses,p.id,'ph'))||'',gv(mk('pisc',td,ses,p.id,'temp'))||'',gv(mk('pisc',td,ses,p.id,'turb'))||'',gv(mk('pisc',td,ses,p.id,'obs'))||'',tec]);});});
  pR.push([],['FIRMA: '+tec,'FECHA: '+now.toLocaleString('es-ES'),'✅ Documento oficial']);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(pR),'Piscinas');
  // ACS
  const aR=[['ACS GRIFOS — Semana '+acsWk],['Técnico: '+tec],[],['Nº','GRIFO','T.FRÍA','T.CALIENTE','APERTURA','TÉCNICO']];
  grifos.forEach(g=>{aR.push([g.ni,g.name,gv(mk('acs',acsWk,g.n,'tf'))||'',gv(mk('acs',acsWk,g.n,'tc'))||'',gv(mk('acs',acsWk,g.n,'ap'))||'',tec]);});
  aR.push([],['FIRMA: '+tec,'FECHA: '+now.toLocaleString('es-ES'),'✅ Documento oficial']);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(aR),'ACS');
  // Incidencias
  const iR=[['INCIDENCIAS'],['Técnico: '+tec],[],['ID','TÍTULO','UBICACIÓN','ESTADO','FECHA','DESCRIPCIÓN']];
  getIncs().forEach(i=>iR.push([i.id,i.titulo,i.ubic||'—',i.status,i.fecha,i.desc||'—']));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(iR),'Incidencias');
  XLSX.writeFile(wb,'AquaPro_'+nom.replace(/\s/g,'_')+'_'+MOS[ppclMo]+yr+'.xlsx');
  toast('📊 Excel exportado con 5 hojas');
}

// ── PDF ────────────────────────────────────────────────
function genPDF(){
  const now=new Date();const yr=parseInt(document.getElementById('ppclYr').value)||now.getFullYear();
  const conds=getConds();const piscs=getPiscs();const grifos=getGrifos();
  const tec=gv('__tecnico')||'—';const nom=gv('__name')||'Mi Empresa';
  const days=new Date(yr,ppclMo+1,0).getDate();
  let html=`<html><head><meta charset="UTF-8"><style>body{font-family:Arial,sans-serif;font-size:10px;color:#1a2332;margin:0;padding:0;}.hdr{background:#0a1628;color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}.hdr h1{font-size:16px;margin:0;}table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:9px;}th{background:#f0f4f8;padding:6px 8px;text-align:left;font-size:8px;letter-spacing:.5px;border-bottom:1px solid #e2e8f0;}td{padding:6px 8px;border-bottom:1px solid #f0f4f8;}.bad{color:#c0392b;font-weight:700;}.sec{font-size:13px;font-weight:700;margin:16px 0 8px;padding:6px 10px;background:#f7f9fc;border-left:3px solid #2589c7;}.firma{border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-top:16px;background:#f7f9fc;}</style></head><body>
  <div class="hdr"><div><h1>💧 AquaControl Pro — Informe Oficial</h1><div style="font-size:10px;opacity:.7">${nom} · ${now.toLocaleString('es-ES')}</div></div><div style="text-align:right;font-size:9px;opacity:.7"><div>${MOS[ppclMo]} ${yr}</div><div>👤 ${tec}</div></div></div>`;
  html+=`<div class="sec">🌡️ Condensadores — ${MOS[ppclMo]} ${yr}</div>`;
  conds.forEach(c=>{
    html+=`<b>${c.name}</b><table><thead><tr><th>DÍA</th><th>BIOCIDAD mg/L</th><th>TEMP °C</th><th>pH</th><th>TURBIDEZ NTU</th></tr></thead><tbody>`;
    for(let d=1;d<=days;d++){
      const b=gv(mk('ppcl',yr,ppclMo,c.n,d,'biocidad'));const t=gv(mk('ppcl',yr,ppclMo,c.n,d,'temperatura'));
      const p=gv(mk('ppcl',yr,ppclMo,c.n,d,'ph'));const turb=gv(mk('ppcl',yr,ppclMo,c.n,d,'turbidez'));
      if(!b&&!t&&!p&&!turb)continue;
      const pN=parseFloat(p);
      html+=`<tr><td><b>${d}</b></td><td>${b||'—'}</td><td>${t||'—'}</td><td class="${p&&(pN<7||pN>8.5)?'bad':''}">${p||'—'}</td><td>${turb||'—'}</td></tr>`;
    }
    html+='</tbody></table>';
  });
  const td=ds(now);
  html+=`<div class="sec">🏊 Piscinas — ${now.toLocaleDateString('es-ES')}</div><table><thead><tr><th>PISCINA</th><th>SESIÓN</th><th>CLORO</th><th>pH</th><th>TEMP</th><th>TURB</th></tr></thead><tbody>`;
  piscs.forEach(p=>{['manana','tarde'].forEach(ses=>{const cl=gv(mk('pisc',td,ses,p.id,'cloro'));const ph=gv(mk('pisc',td,ses,p.id,'ph'));const tm=gv(mk('pisc',td,ses,p.id,'temp'));const tb=gv(mk('pisc',td,ses,p.id,'turb'));if(!cl&&!ph&&!tm&&!tb)return;html+=`<tr><td>${p.name}</td><td>${ses==='manana'?'Mañana':'Tarde'}</td><td>${cl||'—'}</td><td>${ph||'—'}</td><td>${tm||'—'}</td><td>${tb||'—'}</td></tr>`;});});
  html+=`</tbody></table><div class="sec">🚿 ACS — Semana ${acsWk}</div><table><thead><tr><th>Nº</th><th>GRIFO</th><th>T.FRÍA</th><th>T.CALIENTE</th><th>APERTURA</th></tr></thead><tbody>`;
  grifos.forEach(g=>{const tf=gv(mk('acs',acsWk,g.n,'tf'));const tc=gv(mk('acs',acsWk,g.n,'tc'));const ap=gv(mk('acs',acsWk,g.n,'ap'));html+=`<tr><td><b>${g.ni}</b></td><td>${g.name}</td><td>${tf||'—'}</td><td class="${parseFloat(tc)<50&&tc?'bad':''}">${tc||'—'}</td><td>${ap||'—'}</td></tr>`;});
  html+=`</tbody></table>`;
  const incs=getIncs().filter(i=>i.status!=='cerrada');
  if(incs.length){html+=`<div class="sec">🔧 Incidencias activas</div><table><thead><tr><th>TÍTULO</th><th>ESTADO</th><th>FECHA</th><th>UBICACIÓN</th></tr></thead><tbody>`;incs.forEach(i=>html+=`<tr><td>${i.titulo}</td><td>${i.status}</td><td>${i.fecha}</td><td>${i.ubic||'—'}</td></tr>`);html+='</tbody></table>';}
  html+=`<div class="firma"><b>✍️ Técnico:</b> ${tec}<br><b>Fecha:</b> ${now.toLocaleString('es-ES')}<br><div style="margin-top:8px;padding:8px;background:rgba(37,137,199,.08);border-radius:6px;font-size:9px">✅ Generado por AquaControl Pro — RD 487/2022</div></div></body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();setTimeout(()=>w.print(),800);
}
